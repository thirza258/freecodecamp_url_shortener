{% extends "base.html" %}
{% block title %}Rate Limited · {{ SITE_NAME }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="glass-card text-center p-5">
      <p class="eyebrow">429</p>
      <h1 class="display-6 fw-semibold mb-3">Too many requests.</h1>
      <p class="text-secondary mb-4">Your request rate is too high right now. Please wait a moment and try again.</p>
      <a class="btn btn-primary btn-lg" href="{% url 'index' %}">Return home</a>
    </div>
  </div>
</div>
{% endblock %}
