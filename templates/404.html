{% extends "base.html" %}
{% block title %}Not Found · {{ SITE_NAME }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="glass-card text-center p-5">
      <p class="eyebrow">404</p>
      <h1 class="display-6 fw-semibold mb-3">This link does not exist.</h1>
      <p class="text-secondary mb-4">The short code you requested could not be found. Check the link or create a new one from the home page.</p>
      <a class="btn btn-primary btn-lg" href="{% url 'index' %}">Go home</a>
    </div>
  </div>
</div>
{% endblock %}
